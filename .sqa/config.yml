config:
  credentials: []
  project_repos:
    github.com/EOSC-synergy/sqaaas-tooling:
      branch: feature/Ophidia
      repo: https://github.com/EOSC-synergy/sqaaas-tooling
    github.com/micheleartini/dnet-oai-server:
      branch: main
      repo: https://github.com/micheleartini/dnet-oai-server.git
environment:
  JPL_DOCKERFORCEBUILD: enabled
  JPL_KEEPGOING: enabled
sqa_criteria:
  QC.Acc:
    repos:
      github.com/micheleartini/dnet-oai-server git:
        commands:
        - /usr/bin/env sh .sqa/script.flabby-cerulean-labradoodle.sh
        container: qc.acc_nerdy-lavender-ragdoll
  QC.Doc:
    repos:
      github.com/micheleartini/dnet-oai-server find_doc_files.py:
        commands:
        - /usr/bin/env sh .sqa/script.hilly-thistle-orangutan.sh
        container: qc.doc_shaky-khaki-loon
      github.com/micheleartini/dnet-oai-server git:
        commands:
        - /usr/bin/env sh .sqa/script.squeaky-magnolia-tuatara.sh
        container: qc.doc_cloudy-azure-sloth
      github.com/micheleartini/dnet-oai-server markdownlint:
        commands:
        - /usr/bin/env sh .sqa/script.lanky-carmine-hare.sh
        container: qc.doc_thirsty-cream-malamute
  QC.Lic:
    repos:
      github.com/micheleartini/dnet-oai-server licensee:
        commands:
        - /usr/bin/env sh .sqa/script.leaky-beige-sparrow.sh
        container: qc.lic_wheezy-denim-chin
  QC.Sty:
    repos:
      github.com/micheleartini/dnet-oai-server checkstyle:
        commands:
        - /usr/bin/env sh .sqa/script.sleepy-viridian-sponge.sh
        container: qc.sty_grumpy-periwinkle-tapir
      github.com/micheleartini/dnet-oai-server jsonlint:
        commands:
        - /usr/bin/env sh .sqa/script.craggy-flax-frigatebird.sh
        container: qc.sty_tacky-pink-cat
  QC.Ver:
    repos:
      github.com/micheleartini/dnet-oai-server get_git_tags.py:
        commands:
        - /usr/bin/env sh .sqa/script.sleazy-green-akbash.sh
        container: qc.ver_pretty-black-birman
timeout: 5400
